on:
  push:
    branches:
      - main
name: 🚀 Deploy website on push
run-name: 🚀 Deploy website
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:

    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4

    - name: 🔍 Generate search index
      run: |
        python generate_search_index.py

    - name: 🗺️ Generate the sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://www.armoniaerispetto.it/
        additional-extensions: php
        exclude-paths: >
          /common-head.php
          /header.php
          /footer.php
          /send_mail.php
          /documents/statuto.pdf
          /db
          /login_handler.php
          /register_handler.php

    - name: 📝 Replace credentials file
      run: |
        echo "<?php" > db/config/db.php
        echo "" >> db/config/db.php
        echo "\$db_host = '${{ secrets.db_host }}';" >> db/config/db.php
        echo "\$db_name = '${{ secrets.db_name }}';" >> db/config/db.php
        echo "\$db_user = '${{ secrets.db_user }}';" >> db/config/db.php
        echo "\$db_pass = '${{ secrets.db_pass }}';" >> db/config/db.php
        echo "?>" >> db/config/db.php
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.armoniaerispetto.it
        username: ${{ secrets.ftp_username }}
        password: ${{ secrets.ftp_password }}
        server-dir: www.armoniaerispetto.it/
        protocol: ftps
        exclude: |
            **/.git*
            **/.git*/**
            README.md
            generate_search_index.py
            docker/**
            db/migrations/**
            Makefile

  notify-telegram:
    name: 📱 Notify Telegram
    runs-on: ubuntu-latest
    needs: web-deploy
    if: ${{ always() && !cancelled() }}
    steps:
    - name: ✅ Notify successful deploy
      if: ${{ needs.web-deploy.result == 'success' }}
      continue-on-error: true
      run: |
        curl --silent --show-error --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=Deploy OK: armoniaerispetto.it (${{ github.ref_name }}) ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    - name: ❌ Notify failed deploy
      if: ${{ needs.web-deploy.result == 'failure' }}
      continue-on-error: true
      run: |
        curl --silent --show-error --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=Deploy FAILED: armoniaerispetto.it (${{ github.ref_name }}) ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
